<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Discord Self Message Cleaner</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="app">
      <header>
        <div class="brand">
          <svg class="brand-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M7.5 4.5h9l-.6 2H8.1l-.6-2Z"></path>
            <path d="M9 8h6l-.5 10.5a1.8 1.8 0 0 1-1.8 1.7h-1.4a1.8 1.8 0 0 1-1.8-1.7L9 8Z"></path>
            <path d="M10.8 10.5v7M13.2 10.5v7"></path>
          </svg>
          <h1>Discord Self Message Cleaner</h1>
        </div>
        <p>删除当前频道里你自己的可见消息。</p>
      </header>

      <section class="panel">
        <label>
          每轮最多删除
          <input id="limit" type="number" min="1" max="500" value="50">
        </label>

        <label>
          删除间隔（毫秒）
          <input id="delay" type="number" min="600" max="10000" step="100" value="1400">
        </label>

        <label class="check">
          <input id="autoScroll" type="checkbox" checked>
          自动向上加载更早消息
        </label>
      </section>

      <section class="actions">
        <button id="start" type="button">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M8 5.5v13l10-6.5-10-6.5Z"></path>
          </svg>
          开始删除
        </button>
        <button id="stop" type="button" class="secondary">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M7 7h10v10H7z"></path>
          </svg>
          停止
        </button>
      </section>

      <section class="status" aria-live="polite">
        <div class="status-title">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 6v6l4 2"></path>
            <circle cx="12" cy="12" r="8"></circle>
          </svg>
          <strong id="state">待机</strong>
        </div>
        <span id="details">打开 Discord 频道后再运行。</span>
      </section>

      <section class="meta" aria-label="项目信息">
        <a class="meta-row" href="https://github.com/mzrodyu/discord-self-message-cleaner" target="_blank" rel="noreferrer">
          <span class="meta-label">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 2.8a9.2 9.2 0 0 0-2.9 17.9c.5.1.7-.2.7-.5v-1.8c-2.8.6-3.4-1.2-3.4-1.2-.5-1.1-1.1-1.4-1.1-1.4-.9-.6.1-.6.1-.6 1 0 1.6 1.1 1.6 1.1.9 1.6 2.5 1.1 3 .9.1-.7.4-1.1.7-1.3-2.2-.3-4.6-1.1-4.6-4.9 0-1.1.4-2 1.1-2.7-.1-.3-.5-1.3.1-2.7 0 0 .9-.3 3 1a10.3 10.3 0 0 1 5.4 0c2.1-1.3 3-1 3-1 .6 1.4.2 2.4.1 2.7.7.7 1.1 1.6 1.1 2.7 0 3.8-2.4 4.6-4.6 4.9.4.3.7.9.7 1.8v2.6c0 .3.2.6.7.5A9.2 9.2 0 0 0 12 2.8Z"></path>
            </svg>
            仓库
          </span>
          <span class="meta-value">mzrodyu/discord-self-message-cleaner</span>
        </a>
        <div class="meta-row">
          <span class="meta-label">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 12.2a4 4 0 1 0 0-8 4 4 0 0 0 0 8Z"></path>
              <path d="M4.8 20.2a7.2 7.2 0 0 1 14.4 0"></path>
            </svg>
            作者
          </span>
          <span class="meta-value">mzrodyu / catie</span>
        </div>
      </section>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
