<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Discord Self Message Cleaner</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="app">
      <header>
        <div class="brand">
          <svg class="brand-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M7.5 4.5h9l-.6 2H8.1l-.6-2Z"></path>
            <path d="M9 8h6l-.5 10.5a1.8 1.8 0 0 1-1.8 1.7h-1.4a1.8 1.8 0 0 1-1.8-1.7L9 8Z"></path>
            <path d="M10.8 10.5v7M13.2 10.5v7"></path>
          </svg>
          <h1>Discord Self Message Cleaner</h1>
        </div>
        <p>按服务器和频道筛选，只处理你自己的消息。</p>
      </header>

      <section class="panel">
        <label>
          Discord Token
          <div class="token-row">
            <input id="token" type="password" autocomplete="off" spellcheck="false" placeholder="打开 Discord 后自动填入，或手动粘贴">
            <button id="autoToken" type="button" class="inline-action" title="从当前 Discord 标签页自动提取 token">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 12a8 8 0 0 1 14.93-4M20 12a8 8 0 0 1-14.93 4"/><path d="M18 4v4h-4M6 20v-4H2"/></svg>
              自动获取
            </button>
          </div>
        </label>

        <label>
          服务器 ID
          <input id="guildId" type="text" inputmode="numeric" autocomplete="off" spellcheck="false" placeholder="例如 123456789012345678">
        </label>

        <button id="fillCurrent" type="button" class="inline-action">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 5v14M5 12h14"></path>
          </svg>
          一键填当前频道
        </button>

        <label>
          频道 ID
          <input id="channelId" type="text" inputmode="numeric" autocomplete="off" spellcheck="false" placeholder="例如 123456789012345678">
        </label>

        <div class="grid-2">
          <label>
            最多删除
            <input id="limit" type="number" min="1" max="5000" value="100">
          </label>

          <label>
            间隔毫秒
            <input id="delay" type="number" min="800" max="30000" step="100" value="1600">
          </label>
        </div>

        <label>
          起始时间
          <input id="after" type="datetime-local">
        </label>

        <label>
          结束时间
          <input id="before" type="datetime-local">
        </label>

        <label class="check">
          <input id="disclaimer" type="checkbox">
          我确认只删除自己账号在指定服务器和频道里的消息，并已理解删除不可恢复。
        </label>
      </section>

      <section class="actions">
        <button id="uiDelete" type="button" class="wide">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M8 5.5v13l10-6.5-10-6.5Z"></path>
          </svg>
          免 token 删除当前频道可见消息
        </button>
        <button id="uiStop" type="button" class="wide secondary">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M7 7h10v10H7z"></path>
          </svg>
          停止免 token 删除
        </button>
        <button id="preview" type="button">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M4 12s3-6 8-6 8 6 8 6-3 6-8 6-8-6-8-6Z"></path>
            <circle cx="12" cy="12" r="2.5"></circle>
          </svg>
          预览
        </button>
        <button id="delete" type="button" class="danger" disabled>
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M7.5 4.5h9M9 8h6l-.5 10.5a1.8 1.8 0 0 1-1.8 1.7h-1.4a1.8 1.8 0 0 1-1.8-1.7L9 8ZM10.8 10.5v7M13.2 10.5v7"></path>
          </svg>
          删除预览项
        </button>
      </section>

      <section class="status" aria-live="polite">
        <div class="status-title">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 6v6l4 2"></path>
            <circle cx="12" cy="12" r="8"></circle>
          </svg>
          <strong id="state">待机</strong>
        </div>
        <span id="details">打开 Discord 页面后 token 将自动填入，再填服务器/频道 ID，点预览即可。</span>
      </section>

      <section class="results" aria-label="预览结果">
        <div class="results-head">
          <strong>预览消息</strong>
          <span id="count">0 条</span>
        </div>
        <ol id="messages"></ol>
      </section>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
